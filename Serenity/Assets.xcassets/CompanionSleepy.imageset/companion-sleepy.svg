  <g id="foot-left"><ellipse cx="155" cy="395" rx="24" ry="15" fill="#565461" /></g>
  <g id="foot-right"><ellipse cx="245" cy="395" rx="24" ry="15" fill="#565461" /></g>
  <g id="body">
    <path d="M 140 210 C 120 265, 115 345, 145 385 C 160 400, 240 400, 255 385 C 285 345, 280 265, 260 210 Z" fill="url(#furGradient)" />
  </g>
  <g id="belly"><ellipse cx="200" cy="310" rx="48" ry="58" fill="#C2C3CE" /></g>
